<!-- Recent Streams Table Rows (for HTMX refresh) -->
{% for stream in recent_streams %}
<tr class="hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
    <td class="px-3 py-2 whitespace-nowrap">
        <div class="uuid-container inline-flex items-center gap-1">
            <a href="/streams/{{ stream.stream_id }}" class="uuid-display uuid-link link transition-all font-mono text-xs" data-full-uuid="{{ stream.stream_id }}" title="{{ stream.stream_id }}">{{ stream.stream_id|shortuuid }}</a>
            <button class="uuid-copy-btn text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors" data-uuid="{{ stream.stream_id }}" title="Copy {{ stream.stream_id }} to clipboard">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
            </button>
        </div>
    </td>
    <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-600 dark:text-gray-400">
        {{ stream.project_names_display() }}
    </td>
    <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-500 dark:text-gray-400">
        {{ stream.last_activity_at }}
    </td>
    <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-500 dark:text-gray-400">
        {{ stream.start_time }}
    </td>
    <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-900 dark:text-white">
        {{ stream.total_runs|commafy }}
    </td>
    <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-900 dark:text-white">
        {{ stream.total_events|commafy }}
    </td>
</tr>
{% else %}
<tr>
    <td colspan="6" class="px-3 py-4 text-center text-sm text-gray-500 dark:text-gray-400">
        No streams found
    </td>
</tr>
{% endfor %}

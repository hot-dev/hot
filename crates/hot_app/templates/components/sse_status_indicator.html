<!-- SSE Status Indicator Component
     Include this in the breadcrumb area on pages that need real-time updates.

     Required data attributes on the container:
     - data-sse-mode: "auto" (auto-refresh) or "manual" (show "New Data Available")
     - data-sse-filter-stream: optional stream_id to filter events
     - data-sse-filter-run: optional run_id to filter events
     - data-sse-filter-event: optional event_id to filter events
-->

<!-- Shared gradient definitions - must be visible (not display:none) for gradients to work -->
<svg width="0" height="0" style="position: absolute; visibility: hidden;">
    <defs>
        <!-- Orange/Red gradient for active/updating state -->
        <linearGradient id="hot-flame-gradient-active" x1="900" y1="100" x2="900" y2="1700" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="40%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#ef4444"/>
        </linearGradient>
        <!-- Green gradient for live/idle state -->
        <linearGradient id="hot-flame-gradient-live" x1="900" y1="100" x2="900" y2="1700" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#86efac"/>
            <stop offset="40%" stop-color="#22c55e"/>
            <stop offset="100%" stop-color="#16a34a"/>
        </linearGradient>
        <!-- Gray gradient for disconnected state -->
        <linearGradient id="hot-flame-gradient-dim" x1="900" y1="100" x2="900" y2="1700" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#9ca3af"/>
            <stop offset="100%" stop-color="#6b7280"/>
        </linearGradient>
    </defs>
</svg>

<style>
    /* Hot flame icon sizing */
    .hot-flame {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
    }

    /* Active flame animation - pulse and slight flicker */
    .hot-flame-active {
        animation: flame-pulse 0.8s ease-in-out infinite;
        transform-origin: center bottom;
    }

    @keyframes flame-pulse {
        0%, 100% {
            transform: scale(1);
            filter: brightness(1);
        }
        25% {
            transform: scale(1.05) rotate(-1deg);
            filter: brightness(1.1);
        }
        50% {
            transform: scale(1.1);
            filter: brightness(1.2);
        }
        75% {
            transform: scale(1.05) rotate(1deg);
            filter: brightness(1.1);
        }
    }

    /* Idle flame - subtle glow */
    .hot-flame-idle {
        animation: flame-glow 3s ease-in-out infinite;
    }

    @keyframes flame-glow {
        0%, 100% {
            opacity: 0.7;
            filter: brightness(0.9);
        }
        50% {
            opacity: 1;
            filter: brightness(1.1);
        }
    }

    /* Dim flame for disconnected state */
    .hot-flame-dim {
        opacity: 0.5;
        animation: flame-flicker-dim 1.5s ease-in-out infinite;
    }

    @keyframes flame-flicker-dim {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.6; }
    }
</style>

<script>
function sseStatus() {
    return {
        isConnected: false,
        isUpdating: false,
        hasNewData: false,
        mode: 'auto', // 'auto' or 'manual'
        sseConnection: null,
        updateTimeout: null,
        filterStream: null,
        filterRun: null,
        filterEvent: null,

        init() {
            // Read configuration from page
            const indicator = document.getElementById('sse-status-indicator');
            const container = indicator.closest('[data-sse-mode]') || document.querySelector('[data-sse-mode]');

            if (container) {
                this.mode = container.dataset.sseMode || 'auto';
                this.filterStream = container.dataset.sseFilterStream || null;
                this.filterRun = container.dataset.sseFilterRun || null;
                this.filterEvent = container.dataset.sseFilterEvent || null;
            }

            this.connect();

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => this.disconnect());
        },

        connect() {
            if (this.sseConnection) return;

            this.sseConnection = new EventSource('/env/subscribe');

            this.sseConnection.onopen = () => {
                this.isConnected = true;
            };

            this.sseConnection.onerror = () => {
                this.isConnected = false;
                this.sseConnection.close();
                this.sseConnection = null;
                // Reconnect after delay
                setTimeout(() => this.connect(), 3000);
            };

            // Listen for all relevant event types
            const eventTypes = [
                'run:start', 'run:stop', 'run:fail', 'run:cancel',
                'event:created', 'event:handled',
                'stream:created',
                'task:started', 'task:complete'
            ];

            eventTypes.forEach(type => {
                this.sseConnection.addEventListener(type, (e) => this.handleEvent(type, e));
            });
        },

        disconnect() {
            if (this.sseConnection) {
                this.sseConnection.close();
                this.sseConnection = null;
            }
        },

        handleEvent(type, event) {
            try {
                const data = JSON.parse(event.data);

                // Apply filters if configured
                if (this.filterStream && data.stream_id !== this.filterStream) return;
                if (this.filterRun && data.run_id !== this.filterRun) return;
                if (this.filterEvent && data.event_id !== this.filterEvent) return;

                if (this.mode === 'auto') {
                    this.triggerAutoRefresh();
                } else {
                    this.hasNewData = true;
                }
            } catch (e) {
                // Silently ignore parse errors
            }
        },

        triggerAutoRefresh() {
            // Show updating indicator
            this.isUpdating = true;

            // Clear any pending timeout
            if (this.updateTimeout) clearTimeout(this.updateTimeout);

            // Debounce the actual refresh
            this.updateTimeout = setTimeout(() => {
                // Call the page's refresh function if defined
                if (typeof window.sseRefreshCallback === 'function') {
                    window.sseRefreshCallback();
                }

                // Hide updating indicator after a moment
                setTimeout(() => {
                    this.isUpdating = false;
                }, 500);
            }, 500);
        },

        refreshAndClear() {
            this.hasNewData = false;
            this.isUpdating = true;

            // Call the page's refresh function
            if (typeof window.sseRefreshCallback === 'function') {
                window.sseRefreshCallback();
            }

            // Hide updating indicator after a moment
            setTimeout(() => {
                this.isUpdating = false;
            }, 500);
        }
    };
}
</script>

name: hot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: 1.95.0
  TAILWIND_VERSION: v4.1.18
  CARGO_INCREMENTAL: '1'
  CARGO_NET_RETRY: 2
  CARGO_HTTP_TIMEOUT: 30
  SQLX_OFFLINE: 'true'
  CI: 'true'

jobs:
  lint-and-test:
    name: Lint, Rust Tests, and Hot Tests
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/checkout@v5

      - name: Setup toolchain, cache, sccache, tailwind
        uses: ./.github/actions/rust-setup
        with:
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          tailwind-version: ${{ env.TAILWIND_VERSION }}

      - name: Install protobuf compiler (for containerd-client)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -j 4 -- -D warnings

      - name: Verify AGENTS.md sync
        run: bash ./scripts/check-agents-sync.sh

      - name: Hot check
        run: cargo run -- check --ctx hot/ci.ctx.hot

      - name: Run Rust tests
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          cargo test --workspace --all-targets --locked -j 4

      - name: Run Hot init
        run: |
          cargo run --locked --bin hot -- init -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Run Hot tests
        env:
          HOT_TEST_VAR: "set so that :hot.env/vars() is not empty"
        run: |
          cargo run --locked --bin hot -- test -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Run Hot Box tests (Docker integration)
        env:
          HOT_BOX_ENABLED: true
        run: |
          cargo run --locked --bin hot -- test box -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Compile Kata backend (Linux feature check)
        run: |
          cargo check -p hot_task_worker --features kata --locked

      - name: Run hot_task_worker tests
        run: |
          cargo test -p hot_task_worker --locked
          cargo test -p hot_task_worker --features kata --locked --no-run

      - name: Verify doc snippet references
        run: |
          # Check that all {{snippet:...}} references in docs point to valid snippets
          ./scripts/doc-snippets.sh check

      - name: sccache stats
        run: sccache --show-stats || true


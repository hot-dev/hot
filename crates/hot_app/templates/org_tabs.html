{% match page_context.current_org %}
{% when Some with (org) %}
<div class="mt-4 border-b border-gray-200 dark:border-gray-700">
    <nav class="-mb-px flex gap-4 overflow-x-auto sm:gap-8" aria-label="Organization navigation">
        <a href="/@{{ org.slug }}"
           class="{% if page_context.current_page == "organization" %}border-red-500 text-red-600 dark:text-red-400{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 dark:text-gray-400 dark:hover:text-gray-300 dark:hover:border-gray-600{% endif %} whitespace-nowrap py-2 px-1 border-b-2 font-medium text-xs sm:text-sm">
            Overview
        </a>
        <a href="/@{{ org.slug }}/users"
           class="{% if page_context.current_page == "users" %}border-red-500 text-red-600 dark:text-red-400{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 dark:text-gray-400 dark:hover:text-gray-300 dark:hover:border-gray-600{% endif %} whitespace-nowrap py-2 px-1 border-b-2 font-medium text-xs sm:text-sm">
            Users
        </a>
        <a href="/@{{ org.slug }}/teams"
           class="{% if page_context.current_page == "teams" %}border-red-500 text-red-600 dark:text-red-400{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 dark:text-gray-400 dark:hover:text-gray-300 dark:hover:border-gray-600{% endif %} whitespace-nowrap py-2 px-1 border-b-2 font-medium text-xs sm:text-sm">
            Teams
        </a>
        <a href="/@{{ org.slug }}/usage"
           class="{% if page_context.current_page == "usage" %}border-red-500 text-red-600 dark:text-red-400{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 dark:text-gray-400 dark:hover:text-gray-300 dark:hover:border-gray-600{% endif %} whitespace-nowrap py-2 px-1 border-b-2 font-medium text-xs sm:text-sm">
            Usage
        </a>
        <a href="/@{{ org.slug }}/billing"
           class="{% if page_context.current_page == "billing" %}border-red-500 text-red-600 dark:text-red-400{% else %}border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 dark:text-gray-400 dark:hover:text-gray-300 dark:hover:border-gray-600{% endif %} whitespace-nowrap py-2 px-1 border-b-2 font-medium text-xs sm:text-sm">
            Billing
        </a>
    </nav>
</div>
{% when None %}
{% endmatch %}

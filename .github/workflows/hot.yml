name: hot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: 1.96.0
  TAILWIND_VERSION: v4.1.18
  # Disable incremental in CI: it bloats target/ (which Swatinem/rust-cache
  # strips before saving anyway) and reduces sccache hit rates. CI does clean
  # builds against a shared cache, not the inner-loop edit pattern that
  # incremental is designed for.
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: 2
  CARGO_HTTP_TIMEOUT: 30
  SQLX_OFFLINE: 'true'
  CI: 'true'

jobs:
  clippy-and-checks:
    name: Clippy and Static Checks
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/checkout@v5

      - name: Setup toolchain, cache, sccache, tailwind
        uses: ./.github/actions/rust-setup
        with:
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          tailwind-version: ${{ env.TAILWIND_VERSION }}

      # Clippy intentionally uses the workspace default feature set. Keeping it
      # aligned with the workspace test feature set avoids forcing cargo to
      # rebuild the full dependency graph between the two jobs once caches warm.
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --locked -j 4 -- -D warnings

      - name: Verify AGENTS.md sync
        run: bash ./scripts/check-agents-sync.sh

      - name: Verify AI skill assets sync
        run: bash ./scripts/check-ai-assets-sync.sh

      # `hot-static-checks.sh check` runs the default project check, the package
      # aggregate check, and validates {{snippet:...}} references in docs.
      - name: Hot static checks
        run: ./scripts/hot-static-checks.sh check

      - name: sccache stats
        run: sccache --show-stats || true

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: hot
          POSTGRES_PASSWORD: hot
          POSTGRES_DB: hot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hot -d hot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/checkout@v5

      - name: Setup toolchain, cache, sccache, tailwind
        uses: ./.github/actions/rust-setup
        with:
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          tailwind-version: ${{ env.TAILWIND_VERSION }}

      - name: Install pgvector for Postgres tests
        run: |
          docker exec "${{ job.services.postgres.id }}" \
            bash -lc 'apt-get update && apt-get install -y postgresql-18-pgvector'

      - name: Run Rust tests
        env:
          REDIS_URL: redis://localhost:6379
          HOT_TEST_POSTGRES_URI: postgres://hot:hot@localhost:5432/hot
          HOT_TEST_POSTGRES_RESET_SCHEMA: '1'
        run: cargo test --workspace --all-targets --locked -j 4

      - name: sccache stats
        run: sccache --show-stats || true

  hot-tests:
    name: Hot Tests
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: hot
          POSTGRES_PASSWORD: hot
          POSTGRES_DB: hot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hot -d hot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/checkout@v5

      - name: Setup toolchain, cache, sccache, tailwind
        uses: ./.github/actions/rust-setup
        with:
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          tailwind-version: ${{ env.TAILWIND_VERSION }}

      - name: Run Hot init
        run: cargo run --locked --bin hot -- init -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Run Hot tests
        env:
          HOT_TEST_VAR: "set so that :hot.env/vars() is not empty"
        run: cargo run --locked --bin hot -- test -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Install pgvector for Postgres tests
        run: |
          docker exec "${{ job.services.postgres.id }}" \
            bash -lc 'apt-get update && apt-get install -y postgresql-18-pgvector'

      - name: Run Hot init (full suite, Postgres + Redis)
        env:
          HOT_TEST_POSTGRES_URI: postgres://hot:hot@localhost:5432/hot
          HOT_TEST_DB_SCHEMA: hot_full
          HOT_TEST_FILE_STORAGE_PATH: ./.hot/pg-full/file
          HOT_REDIS_URI: redis://localhost:6379
          HOT_QUEUE_TYPE: redis
        run: cargo run --locked --bin hot -- init -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Run Hot tests (full suite, Postgres + Redis)
        env:
          HOT_TEST_VAR: "set so that :hot.env/vars() is not empty"
          HOT_TEST_POSTGRES_URI: postgres://hot:hot@localhost:5432/hot
          HOT_TEST_DB_SCHEMA: hot_full
          HOT_TEST_FILE_STORAGE_PATH: ./.hot/pg-full/file
          HOT_REDIS_URI: redis://localhost:6379
          HOT_QUEUE_TYPE: redis
        run: cargo run --locked --bin hot -- test -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Run Postgres queue smoke tests
        env:
          HOT_TEST_VAR: "set so that :hot.env/vars() is not empty"
          HOT_TEST_POSTGRES_URI: postgres://hot:hot@localhost:5432/hot
          HOT_REDIS_URI: redis://localhost:6379
          HOT_QUEUE_TYPE: redis
        run: cargo run --locked --bin hot -- test -c pg.redis.test.hot --ctx hot/ci.ctx.hot

      - name: Run Hot Box tests (Docker integration)
        env:
          HOT_BOX_ENABLED: true
        run: cargo run --locked --bin hot -- test box -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: Run Hot Box tests (full suite, Postgres + Redis)
        env:
          HOT_BOX_ENABLED: true
          HOT_TEST_POSTGRES_URI: postgres://hot:hot@localhost:5432/hot
          HOT_TEST_DB_SCHEMA: hot_full
          HOT_TEST_FILE_STORAGE_PATH: ./.hot/pg-full/file
          HOT_REDIS_URI: redis://localhost:6379
          HOT_QUEUE_TYPE: redis
        run: cargo run --locked --bin hot -- test box -c hot.test.hot --ctx hot/ci.ctx.hot

      - name: sccache stats
        run: sccache --show-stats || true

  kata-check:
    name: Kata Backend Compile Check
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/checkout@v5

      - name: Setup toolchain, cache, sccache, tailwind
        uses: ./.github/actions/rust-setup
        with:
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          tailwind-version: ${{ env.TAILWIND_VERSION }}

      - name: Install protobuf compiler (for containerd-client)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # `cargo test --no-run --features kata` is a superset of `cargo check`.
      # It is a Linux-only feature compile check.
      - name: Compile Kata backend (Linux feature check)
        run: cargo test -p hot_task_worker --features kata --locked --no-run

      - name: sccache stats
        run: sccache --show-stats || true

  lint-and-test:
    name: Lint, Rust Tests, and Hot Tests
    runs-on: ubuntu-24.04
    needs: [clippy-and-checks, rust-tests, hot-tests, kata-check]
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - name: Check split job results
        run: |
          failed=0
          for result in \
            "${{ needs.clippy-and-checks.result }}" \
            "${{ needs.rust-tests.result }}" \
            "${{ needs.hot-tests.result }}" \
            "${{ needs.kata-check.result }}"; do
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo "One or more split CI jobs failed."
            exit 1
          fi

          echo "All split CI jobs passed."


<!-- Recent Events Table Rows (for HTMX refresh) -->
{% for event in recent_events %}
<tr class="hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
    <td class="px-3 py-2 whitespace-nowrap">
        <div class="uuid-container inline-flex items-center gap-1">
            <a href="/events/{{ event.event_id }}" class="uuid-display uuid-link link transition-all font-mono text-xs" data-full-uuid="{{ event.event_id }}" title="{{ event.event_id }}">{{ event.event_id|shortuuid }}</a>
            <button class="uuid-copy-btn text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors" data-uuid="{{ event.event_id }}" title="Copy {{ event.event_id }} to clipboard">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
            </button>
        </div>
    </td>
    <td class="px-3 py-2 whitespace-nowrap">
        <div class="uuid-container inline-flex items-center gap-1">
            <a href="/streams/{{ event.stream_id }}" class="uuid-display uuid-link link transition-all font-mono text-xs" data-full-uuid="{{ event.stream_id }}" title="{{ event.stream_id }}">{{ event.stream_id|shortuuid }}</a>
            <button class="uuid-copy-btn text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors" data-uuid="{{ event.stream_id }}" title="Copy {{ event.stream_id }} to clipboard">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
            </button>
        </div>
    </td>
    <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-600 dark:text-gray-400">
        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-300">
            {{ event.event_type }}
        </span>
    </td>
    <td class="px-3 py-2 whitespace-nowrap text-xs text-gray-500 dark:text-gray-400">
        {{ event.event_time }}
    </td>
</tr>
{% else %}
<tr>
    <td colspan="4" class="px-3 py-4 text-center text-sm text-gray-500 dark:text-gray-400">
        No events found
    </td>
</tr>
{% endfor %}

{% extends "private_layout.html" %}

{% block content %}
<div class="py-4">
    <div class="max-w-2xl">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
            {% if error_message != "" %}
            <div class="mb-4 p-3 bg-red-100 border border-red-500 text-red-700 rounded-md">
                {{ error_message }}
            </div>
            {% endif %}

            <form action="/envs/new" method="post">
                <div class="mb-6">
                    <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Environment Name <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="name" name="name" value="{{ name }}"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-800 rounded-md shadow-sm focus:ring-red-500 focus:border-red-500 dark:bg-gray-900 dark:text-white"
                           placeholder="e.g., development, staging, production"
                           pattern="[a-z0-9\-]+"
                           title="Only lowercase letters, numbers, and hyphens are allowed"
                           required>
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                        Only lowercase letters, numbers, and hyphens. Used in URLs and API endpoints.
                    </p>
                </div>

                <div class="flex items-center justify-between">
                    <a href="/envs" class="btn btn-secondary">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                        </svg>
                        Create Environment
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

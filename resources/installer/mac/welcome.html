<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 12px;
            line-height: 1.5;
            color: #333;
            padding: 20px;
        }
        @media (prefers-color-scheme: dark) {
            body { color: #e0e0e0; }
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        p {
            margin-bottom: 12px;
        }
        .highlight {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h1>Welcome to Hot Dev</h1>
    <p>
        This installer will guide you through the installation of <span class="highlight">Hot Dev</span>.
    </p>
    <p>
        Click "Continue" to proceed with the installation.
    </p>
</body>
</html>

<!--
  Issues Section - Failed Runs, Failed Tasks & Unhandled Events.

  All three tables render a small set of pulsing skeleton rows on first
  paint. The actual rows are loaded by the JS task queue in dashboard.html
  via `/dashboard/widgets/{failed-runs,failed-tasks,unhandled-events}`,
  which replaces the entire `*-container` innerHTML.
-->
<div class="space-y-6">

                    </thead>

                        <tr>
                            <td class="px-3 py-3"><span class="inline-block h-3 w-24 bg-gray-200 dark:bg-gray-700 rounded animate-pulse"></span></td>
                            <td class="px-3 py-3"><span class="inline-block h-3 w-32 bg-gray-200 dark:bg-gray-700 rounded animate-pulse"></span></td>

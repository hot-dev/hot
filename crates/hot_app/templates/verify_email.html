{% extends "public_layout.html" %}

{% block content %}
<div class="flex justify-center items-center mt-10">
    <div class="glass rounded-lg backdrop-blur-md p-8 border border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-800/70 max-w-md w-full shadow-lg text-center">
        <h1 class="text-xl font-bold mb-2">Confirm your email</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-6">
            Click below to finish creating your account. This verification can only be used once.
        </p>
        <form method="post" action="/verify-email">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="hidden" name="form_token" value="{{ form_token }}">
            <button type="submit" class="btn btn-primary w-full">Confirm email</button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "public_layout.html" %}

{% block content %}
<div class="flex justify-center items-center mt-10">
    <div class="glass rounded-lg backdrop-blur-md p-8 border border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-800/70 max-w-md w-full shadow-lg">
        <div class="mb-8 text-center">
            <h1 class="text-xl font-bold">Claim your handle</h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2">Choose a handle for your Hot Cloud account</p>
            {% if error_message != "" %}
            <div class="mt-4 p-3 bg-red-100 border border-red-500 text-red-700 rounded-md">
                {{ error_message }}
            </div>
            {% endif %}
        </div>

        <form action="/claim-handle{% if plan != "" %}?plan={{ plan }}{% if billing != "" %}&billing={{ billing }}{% endif %}{% endif %}" method="post">
            {% include "_org_handle_fields.html" %}

            <button type="submit" class="w-full bg-hot-red-500 hover:bg-hot-red-600 text-white py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50">
                {% if plan == "hot-free" %}
                Claim handle & verify card
                {% elif plan != "" %}
                Claim handle & continue to payment
                {% else %}
                Claim handle
                {% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}

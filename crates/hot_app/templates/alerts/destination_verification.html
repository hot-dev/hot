{% extends "public_layout.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden">
        <div class="px-6 py-8 text-center">
            {% if success %}
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 dark:bg-green-900 mb-4">
                <svg class="h-6 w-6 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            {% else %}
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 dark:bg-red-900 mb-4">
                <svg class="h-6 w-6 text-red-600 dark:text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </div>
            {% endif %}

            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">{{ result_title }}</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-6">{{ result_message }}</p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-4">
                <a href="/signin" class="btn btn-primary">
                    Sign in to Hot Dev
                </a>
                <a href="{{ page_context.web_url }}" class="inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all duration-200">
                    Learn more about Hot Dev
                </a>
            </div>
            <p class="text-xs text-gray-400 dark:text-gray-500">You can safely close this page.</p>
        </div>
    </div>
</div>
{% endblock %}

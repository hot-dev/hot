<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 12px;
            line-height: 1.5;
            color: #333;
            padding: 20px;
        }
        @media (prefers-color-scheme: dark) {
            body { color: #e0e0e0; }
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #22c55e;
        }
        @media (prefers-color-scheme: dark) {
            h1 { color: #4ade80; }
        }
        p {
            margin-bottom: 12px;
        }
        code {
            font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        @media (prefers-color-scheme: dark) {
            code { background: #333; }
        }
        .command {
            display: block;
            margin: 8px 0;
            padding: 8px 12px;
            background: #1e1e1e;
            color: #e0e0e0;
            border-radius: 6px;
            font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
            font-size: 12px;
        }
        a {
            color: #f97316;
        }
        @media (prefers-color-scheme: dark) {
            a { color: #fb923c; }
        }
    </style>
</head>
<body>
    <h1>Installation Complete!</h1>
    <p>
        Hot Dev has been successfully installed on your Mac.
    </p>
    <p>
        The Hot CLI <code>hot</code> is available in your terminal.
    </p>
    <p>
        For documentation and examples, visit:<br>
        <a href="https://hot.dev/docs">https://hot.dev/docs</a>
    </p>
</body>
</html>

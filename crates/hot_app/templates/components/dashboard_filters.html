<!-- Dashboard Filters Component -->
{% raw %}
<div x-data="dashboardFilters" class="bg-white dark:bg-gray-800 shadow rounded-lg p-2">
    <!-- Filter Controls Row -->
    <div class="flex flex-col gap-4">
        <div class="flex flex-col sm:flex-row flex-wrap gap-4">
            <!-- Project Filter -->
            <div class="w-full sm:w-auto">
                <div x-data="{ open: false }" class="relative">
                    <button @click="open = !open" type="button"
                            class="w-full sm:w-64 text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-3 py-1.5 text-left inline-flex items-center justify-between dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-600 dark:focus:ring-gray-700">
                        <div class="flex items-center space-x-2">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5">
                                <path fill-rule="evenodd" d="M2.25 6a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V6Zm18 3H3.75v9a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5V9Zm-15-3.75A.75.75 0 0 0 4.5 6v.008c0 .414.336.75.75.75h.008a.75.75 0 0 0 .75-.75V6a.75.75 0 0 0-.75-.75H5.25Zm1.5.75a.75.75 0 0 1 .75-.75h.008a.75.75 0 0 1 .75.75v.008a.75.75 0 0 1-.75.75H7.5a.75.75 0 0 1-.75-.75V6Zm3-.75A.75.75 0 0 0 9 6v.008c0 .414.336.75.75.75h.008a.75.75 0 0 0 .75-.75V6a.75.75 0 0 0-.75-.75H9.75Z" clip-rule="evenodd" />
                            </svg>
                            <span x-text="selectedProject === null ? 'All Projects' : getProjectName(selectedProject)"></span>
                        </div>
                        <svg class="w-2.5 h-2.5" :class="{'rotate-180': open}" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 4 4 4-4"/>
                        </svg>
                    </button>
                    <div x-cloak x-show="open" @click.away="open = false" x-transition
                         class="absolute z-10 w-full sm:w-64 mt-1 bg-white rounded-lg shadow-lg border border-gray-200 dark:bg-gray-800 dark:border-gray-600">
                        <div class="py-1">
                            <a @click="selectedProject = null; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">
                                <div class="flex items-center justify-between">
                                    <span>All Projects</span>
                                    <svg x-show="selectedProject === null" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </a>
{% endraw %}
                            {% for project in projects %}
{% raw %}
                            <a @click="selectedProject = '{% endraw %}{{ project.project_id }}{% raw %}'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">
                                <div class="flex items-center justify-between">
                                    <span>{% endraw %}{{ project.name }}{% raw %}</span>
                                    <svg x-show="selectedProject === '{% endraw %}{{ project.project_id }}{% raw %}'" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </a>
{% endraw %}
                            {% endfor %}
{% raw %}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Time Range Filter -->
            <div class="w-full sm:w-auto">
                <div x-data="{ open: false, selectedText: 'Last 24 Hours' }" class="relative">
                    <button @click="open = !open" type="button"
                            class="w-full sm:w-64 text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-3 py-1.5 text-left inline-flex items-center justify-between dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-600 dark:focus:ring-gray-700">
                        <div class="flex items-center space-x-2">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5">
                                <path fill-rule="evenodd" d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75Zm13.5 9a1.5 1.5 0 0 0-1.5-1.5H5.25a1.5 1.5 0 0 0-1.5 1.5v7.5a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5v-7.5Z" clip-rule="evenodd"/>
                            </svg>
                            <span x-text="selectedText"></span>
                        </div>
                        <svg class="w-2.5 h-2.5" :class="{'rotate-180': open}" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 4 4 4-4"/>
                        </svg>
                    </button>
                    <div x-cloak x-show="open" @click.away="open = false" x-transition
                         class="absolute z-10 w-full sm:w-64 mt-1 bg-white rounded-lg shadow-lg border border-gray-200 dark:bg-gray-800 dark:border-gray-600">
                        <div class="py-1">
                            <a @click="setTimeRange('P1D'); selectedText = 'Last 24 Hours'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">Last 24 Hours</a>
                            <a @click="setTimeRange('P7D'); selectedText = 'Last 7 Days'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">Last 7 Days</a>
                            <a @click="setTimeRange('P30D'); selectedText = 'Last 30 Days'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">Last 30 Days</a>
                            <a @click="setTimeRange('P90D'); selectedText = 'Last 90 Days'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">Last 90 Days</a>
                            <a @click="setTimeRange('all'); selectedText = 'All Time'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">All Time</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Time Unit Filter -->
            <div class="w-full sm:w-auto">
                <div x-data="{ open: false }" class="relative">
                    <button @click="open = !open" type="button"
                            class="w-full sm:w-48 text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-3 py-1.5 text-left inline-flex items-center justify-between dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-600 dark:focus:ring-gray-700">
                        <div class="flex items-center space-x-2">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5">
                                <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25ZM12.75 6a.75.75 0 0 0-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 0 0 0-1.5h-3.75V6Z" clip-rule="evenodd" />
                            </svg>
                            <span x-text="getTimeUnitLabel()"></span>
                        </div>
                        <svg class="w-2.5 h-2.5" :class="{'rotate-180': open}" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 4 4 4-4"/>
                        </svg>
                    </button>
                    <div x-cloak x-show="open" @click.away="open = false" x-transition
                         class="absolute z-10 w-full sm:w-48 mt-1 bg-white rounded-lg shadow-lg border border-gray-200 dark:bg-gray-800 dark:border-gray-600">
                        <div class="py-1">
                            <a @click="timeUnit = 'hour'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">
                                <div class="flex items-center justify-between">
                                    <span>Hourly</span>
                                    <svg x-show="timeUnit === 'hour'" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </a>
                            <a @click="timeUnit = 'day'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">
                                <div class="flex items-center justify-between">
                                    <span>Daily</span>
                                    <svg x-show="timeUnit === 'day'" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </a>
                            <a @click="timeUnit = 'month'; open = false; updateFilters()" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">
                                <div class="flex items-center justify-between">
                                    <span>Monthly</span>
                                    <svg x-show="timeUnit === 'month'" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endraw %}
